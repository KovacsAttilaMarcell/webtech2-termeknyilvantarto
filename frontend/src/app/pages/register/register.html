<div class="register-container">

    <mat-card>

        <mat-card-title>
            Terméknyilvántartó
        </mat-card-title>

        <h2 class="subtitle">
            Regisztráció
        </h2>

        <mat-card-content>

            <mat-form-field appearance="outline">
                <mat-label>Felhasználónév</mat-label>
                <input matInput [(ngModel)]="username">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Jelszó</mat-label>
                <input matInput type="password" [(ngModel)]="password">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Jelszó megerősítése</mat-label>
                <input matInput type="password" [(ngModel)]="confirmPassword">
            </mat-form-field>

            <button mat-raised-button color="primary" (click)="register()">
                Regisztráció
            </button>

            <p class="error" *ngIf="errorMessage">
                {{ errorMessage }}
            </p>

            <p class="login-text">
                Már van fiókod?
                <a routerLink="/">Bejelentkezés</a>
            </p>

        </mat-card-content>

    </mat-card>

</div>
